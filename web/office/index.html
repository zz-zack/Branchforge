<!doctype html>
<html lang="zh"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BranchForge Office</title>
<style>
  :root{--ink:#2b3242;--mut:#8b93a4;--line:#e3ddd1;--acc:#7c5cff;--ok:#3fae74}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,"PingFang SC",sans-serif;color:var(--ink);overflow:hidden;background:#d9d3c7}
  canvas{display:block;position:fixed;inset:0}
  .bar{position:fixed;top:0;left:0;right:0;height:54px;display:flex;align-items:center;gap:10px;padding:0 18px;
    background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:20}
  .bar h1{font-size:15px;font-weight:700}.bar .sub{font-size:12px;color:var(--mut);margin-right:auto}
  button{padding:8px 13px;border:none;border-radius:9px;background:#eef0f4;color:var(--ink);font-size:13px;font-weight:600;
    cursor:pointer;border:1px solid #e4e7ee;transition:.15s}button:hover{background:#e6e9ef}
  button.p{background:var(--acc);color:#fff;border-color:transparent}button.g{background:var(--ok);color:#fff;border-color:transparent}
  .tip{position:fixed;pointer-events:none;z-index:40;background:#1c2333;color:#dbe4f7;border-radius:10px;padding:9px 11px;
    font-size:12px;opacity:0;transition:.12s;max-width:230px;box-shadow:0 14px 34px rgba(0,0,0,.4)}
  .tip .b{font-family:ui-monospace,monospace;color:#9fb4e0;font-size:11px;margin-top:2px}
  .ov{position:fixed;inset:0;background:rgba(20,24,36,.55);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50}
  .ov.on{display:flex}
  .panel{width:min(620px,92vw);background:#fff;border-radius:16px;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .panel h2{font-family:ui-monospace,monospace;font-size:15px}.panel .x{float:right;cursor:pointer;color:var(--mut);font-size:20px}
  .panel pre{background:#1c2333;color:#cddcff;border-radius:10px;padding:12px;margin-top:12px;font-size:12px;white-space:pre-wrap;font-family:ui-monospace,monospace}
  .load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:14px;z-index:5}
</style></head>
<body>
  <div class="bar">
    <h1>BranchForge Office</h1>
    <span class="sub">真·LPC 像素工程师 · 对外一个开发者,对内一个团队</span>
    <button class="p" id="b1">+ 派 3 个任务</button>
    <button id="b2">⌨️ 开工</button>
    <button class="g" id="b3">🧪 跑测试(闸门)</button>
    <button id="b4">📦 全部提交评审</button>
    <button id="b5">↺ Reset</button>
  </div>
  <div class="load" id="load">加载像素资产…</div>
  <div class="tip" id="tip"></div>
  <div class="ov" id="ov"><div class="panel" id="panel"></div></div>
  <script src="pixi.min.js"></script>
  <script>
  (async function(){
    const app=new PIXI.Application({resizeTo:window,backgroundColor:0xd9d3c7,antialias:true,resolution:Math.min(2,devicePixelRatio||1),autoDensity:true})
    document.body.appendChild(app.view)
    const A=['body_light','body_dark','body_tan','shirt_teal','shirt_maroon','shirt_white','pants_teal','pants_red','pants_white','hair_black','hair_parted']
    A.forEach(k=>PIXI.Assets.add({alias:k,src:'assets/'+k+'.png'}))
    const tex=await PIXI.Assets.load(A)
    A.forEach(k=>tex[k].baseTexture.scaleMode=PIXI.SCALE_MODES.NEAREST)
    document.getElementById('load').style.display='none'

    const fcache={}
    function fr(base,col,row){const key=base+col+'_'+row;if(fcache[key])return fcache[key];const t=new PIXI.Texture(tex[base].baseTexture,new PIXI.Rectangle(col*64,row*64,64,64));fcache[key]=t;return t}
    const DOWN=10,RIGHT=11,LEFT=9
    function makeChar(skin,shirt,pants,hair){
      const c=new PIXI.Container()
      c._l=[skin,pants,shirt,hair].map(b=>{const s=new PIXI.Sprite();s.anchor.set(0.5,0.86);c.addChild(s);return {s,b}})
      c.setFrame=(col,row)=>c._l.forEach(l=>l.s.texture=fr(l.b,col,row))
      c.setFrame(0,DOWN);c.scale.set(1.45)
      return c
    }

    const FW=()=>app.screen.width,FH=()=>app.screen.height
    const fx=46,fy=92
    const charsL=new PIXI.Container(),desksL=new PIXI.Container(),fxL=new PIXI.Container()
    const floorG=new PIXI.Graphics(),boardG=new PIXI.Graphics()
    app.stage.addChild(floorG,charsL,desksL,boardG,fxL)
    let boardX=0
    function layout(){
      const W=FW(),fw=W-330,fh=FH()-fy-40
      floorG.clear().beginFill(0xece6db).drawRoundedRect(fx,fy,fw,fh,22).endFill().lineStyle(1,0xddd6c8).drawRoundedRect(fx,fy,fw,fh,22)
      floorG.beginFill(0xe3dccb).drawRoundedRect(fx+18,fy+fh-70,120,52,12).endFill()
      boardX=W-280
      boardG.clear().beginFill(0xffffff).drawRoundedRect(boardX,fy,250,fh,16).endFill().lineStyle(1,0xe3ddd1).drawRoundedRect(boardX,fy,250,fh,16)
      boardTitle.position.set(boardX+16,fy+14);boardCnt.position.set(boardX+16,fy+36)
      coffee.position.set(fx+30,fy+fh-56)
    }
    const boardTitle=new PIXI.Text('main 分支',{fontFamily:'system-ui',fontSize:15,fontWeight:'700',fill:0x2b3242})
    const boardCnt=new PIXI.Text('已合并 0 次',{fontFamily:'system-ui',fontSize:12,fill:0x8b93a4})
    const coffee=new PIXI.Text('☕ 茶水间',{fontFamily:'system-ui',fontSize:12,fill:0xa49a86})
    fxL.addChild(boardTitle,boardCnt,coffee)
    layout();addEventListener('resize',layout)

    function slots(){return [[fx+170,fy+210],[fx+360,fy+210],[fx+550,fy+210],[fx+170,fy+400],[fx+360,fy+400],[fx+550,fy+400]]}
    const LEAD=[fx+360,fy+96]
    function drawDesk(g,working,lead){
      g.clear()
      g.beginFill(0x8a5a3c).drawRoundedRect(-52,2,104,16,7).endFill()
      g.beginFill(lead?0xb6a6ff:0x6d7787).drawRoundedRect(-22,-12,44,16,3).endFill()
      g.beginFill(working?0x7c5cff:0x222b3f).drawRoundedRect(-19,-22,38,12,2).endFill()
    }
    const SK=['body_light','body_dark','body_tan'],SH=['shirt_teal','shirt_maroon','shirt_white'],PA=['pants_teal','pants_red','pants_white'],HA=['hair_black','hair_parted']
    const tasks=[
      {t:'实现 JWT 鉴权',log:'[tool] Read auth.ts\n[tool] Write jwt.ts\n[tool] Bash npm test\n测试通过 ok'},
      {t:'用户中心前端',log:'[tool] Glob src/**\n[tool] Edit UserPage.tsx\n[tool] Bash build\n构建成功 ok'},
      {t:'数据库 schema',log:'[tool] Write schema.sql\n[tool] Bash migrate\nmigration ok'}
    ]
    let seq=0,merges=0,workers=[]
    const tweens=[]
    function tween(dur,fn,done){tweens.push({t:0,dur,fn,done})}

    const leadC=makeChar('body_light','shirt_maroon','pants_white','hair_parted');leadC.position.set(LEAD[0],LEAD[1]);charsL.addChild(leadC)
    const leadDesk=new PIXI.Graphics();leadDesk.position.set(LEAD[0],LEAD[1]);drawDesk(leadDesk,false,true);desksL.addChild(leadDesk)
    const leadTag=new PIXI.Text('Lead · 组长',{fontFamily:'ui-monospace',fontSize:11,fill:0x7c5cff,fontWeight:'700'});leadTag.anchor.set(0.5);leadTag.position.set(LEAD[0],LEAD[1]-86);fxL.addChild(leadTag)

    function spawn(n){
      const sl=slots()
      for(let k=0;k<n && workers.length<6;k++){
        const i=workers.length,p=sl[i],tk=tasks[seq%tasks.length]
        const w={id:++seq,branch:'forge/s-'+Math.random().toString(36).slice(2,6),task:tk.t,log:tk.log,files:1+(seq%3),status:'idle',baseY:p[1],home:[p[0],p[1]]}
        const c=makeChar(SK[seq%3],SH[seq%3],PA[seq%3],HA[seq%2]);c.position.set(p[0],p[1]);c.alpha=0;charsL.addChild(c)
        const d=new PIXI.Graphics();d.position.set(p[0],p[1]);drawDesk(d,false);desksL.addChild(d)
        const tag=new PIXI.Text(w.branch,{fontFamily:'ui-monospace',fontSize:10,fill:0x8b93a4});tag.anchor.set(0.5);tag.position.set(p[0],p[1]-86);fxL.addChild(tag)
        const chkbg=new PIXI.Graphics().beginFill(0x3fae74).drawCircle(0,0,11).endFill();chkbg.position.set(p[0]+24,p[1]-78);chkbg.visible=false
        const chk=new PIXI.Text('✓',{fontFamily:'system-ui',fontSize:14,fill:0xffffff,fontWeight:'700'});chk.anchor.set(0.5);chk.position.set(p[0]+24,p[1]-78);chk.visible=false
        fxL.addChild(chkbg,chk)
        const hit=new PIXI.Graphics().beginFill(0xffffff,0.001).drawRect(p[0]-40,p[1]-90,80,120).endFill()
        hit.eventMode='static';hit.cursor='pointer';desksL.addChild(hit)
        hit.on('pointerover',()=>showTip(w));hit.on('globalpointermove',e=>moveTip(e));hit.on('pointerout',hideTip);hit.on('pointertap',()=>openPanel(w))
        w.c=c;w.d=d;w.tag=tag;w.chk=chk;w.chkbg=chkbg;w.hit=hit;workers.push(w)
        tween(0.4,t=>{c.alpha=t;c.y=p[1]+(1-t)*8})
      }
    }
    function work(){workers.forEach(w=>{if(w.status!=='pass'&&!w._inreview){w.status='work';drawDesk(w.d,true)}})}
    function setBadge(w){const pass=w.status==='pass';w.chkbg.clear().beginFill(pass?0x3fae74:0xc2533a).drawCircle(0,0,11).endFill();w.chk.text=pass?'✓':'✗';w.chk.visible=true;w.chkbg.visible=true}
    function runTests(){workers.forEach(w=>{if(w._inreview)return;w.status=Math.random()<0.62?'pass':'fail';setBadge(w)})}
    let curBubble=null,leadReviewing=false
    function bubble(x,y,text,color){
      if(curBubble)fxL.removeChild(curBubble.bg,curBubble.t)
      const t=new PIXI.Text(text,{fontFamily:'system-ui',fontSize:12,fill:color||0x2b3242,fontWeight:'700'});t.anchor.set(0.5)
      const bw=t.width+22
      const bg=new PIXI.Graphics().beginFill(0xffffff).drawRoundedRect(x-bw/2,y-15,bw,30,9).endFill().lineStyle(1,0xe3ddd1).drawRoundedRect(x-bw/2,y-15,bw,30,9)
      t.position.set(x,y);fxL.addChild(bg,t);const cur={bg,t};curBubble=cur
      setTimeout(()=>{if(curBubble===cur){fxL.removeChild(bg,t);curBubble=null}},1600)
    }
    function walkTo(w,tx,ty,done){
      const sx=w.c.x,sy=w.c.y,dist=Math.hypot(tx-sx,ty-sy),dur=Math.max(0.45,dist/200),row=tx<sx?LEFT:RIGHT;let wt=0
      tween(dur,t=>{w.c.x=sx+(tx-sx)*t;w.c.y=sy+(ty-sy)*t;wt+=0.02;w.c.setFrame(1+Math.floor(wt*9)%8,row)},()=>{w.c.setFrame(0,DOWN);if(done)done()})
    }
    function floatText(x,y,txt){const t=new PIXI.Text(txt,{fontFamily:'system-ui',fontSize:20});t.anchor.set(0.5);t.position.set(x,y);fxL.addChild(t);tween(1.1,k=>{t.y=y-28*k;t.alpha=1-k},()=>fxL.removeChild(t))}
    const queue=[];let reviewing=false
    const REVIEW=()=>[LEAD[0]-80,LEAD[1]+12]
    const LINE=i=>[LEAD[0]-168,LEAD[1]+40+i*46]
    function submitAll(){
      workers.forEach(w=>{
        if(w._inreview)return
        w._inreview=true;w.hit.eventMode='none';w.tag.visible=false;w.chk.visible=false;w.chkbg.visible=false;drawDesk(w.d,false)
        const i=queue.length;queue.push(w);walkTo(w,LINE(i)[0],LINE(i)[1])
      })
      processQueue()
    }
    function relayout(){queue.forEach((w,i)=>{if(i===0&&reviewing)return;walkTo(w,LINE(i)[0],LINE(i)[1])})}
    function processQueue(){
      if(reviewing||!queue.length)return
      reviewing=true;const w=queue[0]
      walkTo(w,REVIEW()[0],REVIEW()[1],()=>{
        bubble(LEAD[0],LEAD[1]-104,'组长审查中…');leadReviewing=true
        setTimeout(()=>{
          if(w.status==='pass'){
            bubble(LEAD[0],LEAD[1]-104,'✅ 合格,合并',0x2f9e63);leadReviewing=false
            walkTo(w,boardX-30,REVIEW()[1],()=>{doMergeQueued(w);reviewing=false;relayout();processQueue()})
          }else{
            bubble(LEAD[0],LEAD[1]-104,'↩︎ 不合格,返工',0xc2533a);leadReviewing=false;floatText(REVIEW()[0],REVIEW()[1]-72,'😓')
            walkTo(w,w.home[0],w.home[1],()=>{queue.shift();w._inreview=false;w.status='work';drawDesk(w.d,true);w.hit.eventMode='static';w.tag.visible=true;reviewing=false;relayout();processQueue()})
          }
        },900)
      })
    }
    function doMergeQueued(w){
      queue.shift();const wi=workers.indexOf(w);if(wi>=0)workers.splice(wi,1)
      merges++;boardCnt.text='已合并 '+merges+' 次'
      const cardY=fy+58+(merges-1)*46
      const card=new PIXI.Graphics();card._card=1
      card.beginFill(0xf6f8fb).drawRoundedRect(boardX+14,cardY,222,38,8).endFill().beginFill(0x3fae74).drawRoundedRect(boardX+14,cardY,3,38,2).endFill()
      const ct=new PIXI.Text(w.task,{fontFamily:'system-ui',fontSize:12,fill:0x2b3242});ct._card=1;ct.position.set(boardX+24,cardY+6)
      const cb=new PIXI.Text(w.branch+' · +'+w.files+' 文件',{fontFamily:'ui-monospace',fontSize:10,fill:0x8b93a4});cb._card=1;cb.position.set(boardX+24,cardY+21)
      fxL.addChild(card,ct,cb);floatText(boardX+40,cardY-4,'🎉')
      charsL.removeChild(w.c);desksL.removeChild(w.d,w.hit);fxL.removeChild(w.tag,w.chk,w.chkbg)
    }
    function reset(){workers.slice().forEach(w=>{charsL.removeChild(w.c);desksL.removeChild(w.d,w.hit);fxL.removeChild(w.tag,w.chk,w.chkbg)});workers=[];merges=0;seq=0;boardCnt.text='已合并 0 次';fxL.children.filter(n=>n._card).forEach(n=>fxL.removeChild(n))}

    const tip=document.getElementById('tip'),ov=document.getElementById('ov')
    function showTip(w){tip.style.opacity=1;tip.innerHTML='<div style="font-weight:700">'+w.branch+'</div><div class="b">'+w.task+' · +'+w.files+' 文件 · '+(w.status==='pass'?'闸门 PASS':w.status==='fail'?'闸门 FAIL':w.status==='work'?'搬砖中':'待命')+'</div>'}
    function moveTip(e){const g=e.global;tip.style.left=(g.x+16)+'px';tip.style.top=(g.y+60)+'px'}
    function hideTip(){tip.style.opacity=0}
    function openPanel(w){document.getElementById('panel').innerHTML='<span class="x" id="px">×</span><h2>'+w.branch+'</h2><div style="color:#8b93a4;font-size:13px;margin-top:4px">'+w.task+' · +'+w.files+' 文件 · '+(w.status==='pass'?'闸门 PASS':'进行中')+'</div><pre>'+w.log+'</pre>';ov.classList.add('on');document.getElementById('px').onclick=()=>ov.classList.remove('on')}
    ov.onclick=e=>{if(e.target===ov)ov.classList.remove('on')}

    app.ticker.add(()=>{
      const t=app.ticker.lastTime/1000
      for(let i=tweens.length-1;i>=0;i--){const tw=tweens[i];tw.t+=app.ticker.deltaMS/1000;const k=Math.min(1,tw.t/tw.dur);tw.fn(k);if(tw.t>=tw.dur){if(tw.done)tw.done();tweens.splice(i,1)}}
      for(const w of workers){if(w.status==='work'&&!w._inreview)w.c.y=w.baseY+Math.sin(t*3+w.c.x)*1.5}
      leadC.y=LEAD[1]+(leadReviewing?Math.sin(t*7)*2:0)
    })

    document.getElementById('b1').onclick=()=>spawn(3)
    document.getElementById('b2').onclick=work
    document.getElementById('b3').onclick=runTests
    document.getElementById('b4').onclick=submitAll
    document.getElementById('b5').onclick=reset
  })()
  </script>
</body></html>
